<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="brand_colors.css">
<style>
  html, body {
    margin:0; padding:0; background: transparent;
    width:1080px; height:1920px; overflow:hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
  }
  .stage { position:relative; width:1080px; height:1920px; }

  .heading {
    position:absolute; top:100px; left:50%; transform:translateX(-50%) scale(0.8); opacity:0;
    font-size:34px; font-weight:800; color:var(--brand-white);
    background: var(--gradient-primary);
    padding:16px 32px; border-radius:14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transition: transform 0.8s cubic-bezier(.22,.68,0,1.01), opacity 0.8s ease;
  }
  .heading.show { transform:translateX(-50%) scale(1); opacity:1; }

  .mapWrap {
    position:absolute; top:280px; left:50%; transform:translateX(-50%);
    width:900px; height:700px;
  }

  .mapBase {
    width:100%; height:100%; border-radius:24px;
    background: rgba(255,255,255,0.04);
    border: 2px dashed rgba(255,255,255,0.15);
  }

  .marker {
    position:absolute; width:26px; height:26px; border-radius:50%;
    background: var(--gradient-highlight);
    box-shadow: var(--shadow-highlight);
    transform: translate(-50%,-50%) scale(0);
    transition: transform 0.5s cubic-bezier(.17,.89,.32,1.49);
  }
  .marker.show {
    transform: translate(-50%,-50%) scale(1);
    animation: pulseMarker 1.6s ease-in-out 0.5s infinite;
  }
  @keyframes pulseMarker {
    0%,100%{ box-shadow:0 0 0 0 rgba(255,107,0,0.5); }
    50%{ box-shadow:0 0 0 18px rgba(255,107,0,0); }
  }

  .markerLabel {
    position:absolute; font-size:24px; font-weight:800; color:var(--brand-white);
    background: rgba(18,18,18,0.85); padding:8px 16px; border-radius:8px;
    transform: translate(-50%,-160%); opacity:0; transition: opacity 0.4s ease;
    white-space:nowrap;
  }
  .markerLabel.show { opacity:1; }

  .connector {
    position:absolute; height:3px; background: var(--brand-orange);
    transform-origin: left center; opacity:0; transition: opacity 0.4s ease;
  }
  .connector.show { opacity:0.6; }

  .counter {
    position:absolute; top:1020px; left:50%; transform:translateX(-50%) translateY(20px);
    font-size:32px; font-weight:800; color:var(--brand-white); text-align:center;
    background: rgba(18,18,18,0.8); padding:16px 30px; border-radius:14px;
    opacity:0; transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .counter.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="stage">
    <div class="heading" id="heading">EXPANDING ACROSS NIGERIA</div>

    <div class="mapWrap">
      <div class="mapBase"></div>

      <div class="connector" id="c1" style="top:180px; left:180px; width:220px;"></div>
      <div class="connector" id="c2" style="top:340px; left:400px; width:200px;"></div>
      <div class="connector" id="c3" style="top:340px; left:400px; width:180px; transform:rotate(35deg);"></div>

      <div class="marker" id="m0" style="top:180px; left:180px;"></div>
      <div class="markerLabel" id="l0" style="top:180px; left:180px;">Lagos (HQ)</div>

      <div class="marker" id="m1" style="top:340px; left:400px;"></div>
      <div class="markerLabel" id="l1" style="top:340px; left:400px;">Abuja</div>

      <div class="marker" id="m2" style="top:200px; left:600px;"></div>
      <div class="markerLabel" id="l2" style="top:200px; left:600px;">Kano</div>

      <div class="marker" id="m3" style="top:460px; left:560px;"></div>
      <div class="markerLabel" id="l3" style="top:460px; left:560px;">Port Harcourt</div>
    </div>

    <div class="counter" id="counter">1 state → 4 states</div>
  </div>

<script>
  const heading = document.getElementById('heading');
  const markers = [0,1,2,3].map(i => document.getElementById('m' + i));
  const labels = [0,1,2,3].map(i => document.getElementById('l' + i));
  const connectors = ['c1','c2','c3'].map(id => document.getElementById(id));
  const counter = document.getElementById('counter');

  const startDelay = 200;
  const markerStagger = 550;

  setTimeout(() => { heading.classList.add('show'); }, startDelay);

  markers.forEach((marker, i) => {
    const delay = startDelay + 600 + i * markerStagger;
    setTimeout(() => {
      marker.classList.add('show');
      labels[i].classList.add('show');
      if (connectors[i - 1]) connectors[i - 1].classList.add('show');
    }, delay);
  });

  setTimeout(() => {
    counter.classList.add('show');
  }, startDelay + 600 + markers.length * markerStagger + 300);
</script>
</body>
</html>
