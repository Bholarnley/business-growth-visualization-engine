<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="brand_colors.css">
<style>
  html, body {
    margin:0; padding:0; background: transparent;
    width:1080px; height:1920px; overflow:hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
  }
  .stage { position:relative; width:1080px; height:1920px; }

  .calendarWrap {
    position:absolute; top:120px; left:50%; transform:translateX(-50%) scale(0.85);
    width:460px; height:460px; opacity:0;
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.22,.68,0,1.01);
    perspective: 1200px;
  }
  .calendarWrap.show { opacity:1; transform:translateX(-50%) scale(1); }

  .calBase {
    position:absolute; top:0; left:0; width:100%; height:100%;
    background: #FFFFFF; border-radius:20px; box-shadow: 0 16px 50px rgba(0,0,0,0.5);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .calHeader {
    background: linear-gradient(135deg, #E63946, #FF6B00);
    padding:20px; text-align:center;
  }
  .calHeaderText { font-size:24px; font-weight:800; color:#FFFFFF; letter-spacing:1px; }

  .calBody { flex:1; display:flex; align-items:center; justify-content:center; position:relative; }
  .monthPage {
    position:absolute; font-size:80px; font-weight:800; color:#121212;
    backface-visibility:hidden;
  }

  .flipLabel {
    position:absolute; top:640px; left:50%; transform:translateX(-50%) translateY(15px);
    font-size:32px; font-weight:700; color:#FFFFFF; text-align:center;
    background: rgba(18,18,18,0.82); padding:14px 28px; border-radius:14px;
    opacity:0; transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .flipLabel.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="stage">
    <div class="calendarWrap" id="calendarWrap">
      <div class="calBase">
        <div class="calHeader"><div class="calHeaderText">FINANCIAL YEAR</div></div>
        <div class="calBody" id="calBody">
          <div class="monthPage" id="monthPage">JAN</div>
        </div>
      </div>
    </div>
    <div class="flipLabel" id="flipLabel">Time is moving fast</div>
  </div>

<script>
  const calendarWrap = document.getElementById('calendarWrap');
  const monthPage = document.getElementById('monthPage');
  const flipLabel = document.getElementById('flipLabel');

  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const startDelay = 200;
  const flipInterval = 180; // ms per month flip - fast, rapid flipping feel

  setTimeout(() => { calendarWrap.classList.add('show'); }, startDelay);

  months.forEach((month, i) => {
    setTimeout(() => {
      monthPage.style.transform = 'rotateX(90deg)';
      setTimeout(() => {
        monthPage.textContent = month;
        monthPage.style.transform = 'rotateX(0deg)';
      }, 90);
    }, startDelay + 500 + i * flipInterval);
  });

  setTimeout(() => { flipLabel.classList.add('show'); }, startDelay + 500 + months.length * flipInterval + 200);
</script>
</body>
</html>
