<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="brand_colors.css">
<style>
  html, body {
    margin:0; padding:0; background: transparent;
    width:1080px; height:1920px; overflow:hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
  }
  .stage { position:relative; width:1080px; height:1920px; }

  .cardWrap {
    position:absolute; top:120px; left:90px; width:900px; height:420px;
    border-radius:24px; overflow:hidden;
    background: linear-gradient(160deg, #1B2430, #121212);
    box-shadow: 0 16px 50px rgba(0,0,0,0.5);
    opacity:0; transform:scale(0.9);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(.22,.68,0,1.01);
  }
  .cardWrap.show { opacity:1; transform:scale(1); }

  .cardHeader { padding:24px 32px 10px; }
  .cardLabel { font-size:22px; color:rgba(255,255,255,0.55); font-weight:600; letter-spacing:1px; }
  .balance { font-size:60px; font-weight:800; color:#FFFFFF; margin-top:6px; }

  .flowRow {
    display:flex; align-items:center; justify-content:space-between;
    padding:30px 50px; position:relative; height:180px;
  }

  .flowSide { display:flex; flex-direction:column; align-items:center; gap:10px; z-index:2; }
  .flowIcon {
    width:70px; height:70px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .flowIcon.in { background: linear-gradient(135deg, #2ECC71, #00A896); }
  .flowIcon.out { background: linear-gradient(135deg, #E63946, #FF6B00); }
  .flowIcon svg { width:32px; height:32px; }
  .flowLabel { font-size:20px; font-weight:700; color:rgba(255,255,255,0.7); }
  .flowAmount { font-size:26px; font-weight:800; }
  .flowAmount.in { color:#2ECC71; }
  .flowAmount.out { color:#E63946; }

  .dot {
    position:absolute; top:50%; width:16px; height:16px; border-radius:50%;
    transform:translateY(-50%); opacity:0;
  }
  .dot.in { left:120px; background:#2ECC71; box-shadow:0 0 12px #2ECC71; }
  .dot.out { right:120px; background:#E63946; box-shadow:0 0 12px #E63946; }
  .dot.in.move { animation: moveIn 1.1s ease-in forwards; }
  .dot.out.move { animation: moveOut 1.1s ease-in forwards; }
  @keyframes moveIn { from { left:120px; opacity:1; } to { left:490px; opacity:0; } }
  @keyframes moveOut { from { right:120px; opacity:1; } to { right:490px; opacity:0; } }
</style>
</head>
<body>
  <div class="stage">
    <div class="cardWrap" id="cardWrap">
      <div class="cardHeader">
        <div class="cardLabel">BUSINESS ACCOUNT BALANCE</div>
        <div class="balance" id="balance">₦1,240,000</div>
      </div>
      <div class="flowRow">
        <div class="flowSide">
          <div class="flowIcon in"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg></div>
          <div class="flowLabel">MONEY IN</div>
          <div class="flowAmount in">+₦420,000</div>
        </div>
        <div class="dot in" id="dotIn"></div>
        <div class="dot out" id="dotOut"></div>
        <div class="flowSide">
          <div class="flowIcon out"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="5 12 12 5 19 12"/></svg></div>
          <div class="flowLabel">MONEY OUT</div>
          <div class="flowAmount out">-₦310,000</div>
        </div>
      </div>
    </div>
  </div>

<script>
  const cardWrap = document.getElementById('cardWrap');
  const dotIn = document.getElementById('dotIn');
  const dotOut = document.getElementById('dotOut');

  setTimeout(() => { cardWrap.classList.add('show'); }, 200);
  setTimeout(() => { dotIn.classList.add('move'); dotOut.classList.add('move'); }, 900);
  setTimeout(() => { dotIn.classList.remove('move'); dotOut.classList.remove('move'); dotIn.classList.add('move'); dotOut.classList.add('move'); }, 2100);
</script>
</body>
</html>
