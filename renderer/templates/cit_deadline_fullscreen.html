<!DOCTYPE html>
<html>
<head>
<style>
  html, body {
    margin:0; padding:0; background: transparent;
    width:1080px; height:1920px; overflow:hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  .stage { position:relative; width:1080px; height:1920px; }

  .badge {
    position:absolute; top:200px; left:50%;
    transform:translateX(-50%) scale(0);
    background: linear-gradient(135deg, #ff3d3d, #ff8a00);
    color:white; padding:22px 44px; border-radius:16px;
    font-size:48px; font-weight:800; letter-spacing:1px;
    box-shadow: 0 8px 30px rgba(255,61,61,0.5);
    animation: popIn 0.6s cubic-bezier(.17,.89,.32,1.49) forwards,
               pulse 1.6s ease-in-out 0.6s infinite;
  }
  @keyframes popIn { to { transform:translateX(-50%) scale(1); } }
  @keyframes pulse {
    0%,100%{ box-shadow:0 0 0 0 rgba(255,138,0,0.5); }
    50%{ box-shadow:0 0 0 24px rgba(255,138,0,0); }
  }

  .deadline {
    position:absolute; top:400px; left:50%; transform:translateX(-50%) translateY(30px);
    font-size:40px; color:#fff; text-align:center; line-height:1.5;
    background: linear-gradient(135deg, #1e1e3f, #3d1e6d);
    padding:30px 40px; border-radius:20px;
    opacity:0; box-shadow: 0 8px 30px rgba(61,30,109,0.5);
    animation: fadeUp 0.8s ease forwards; animation-delay: 1.2s;
  }
  .deadline b { color:#ffd60a; }

  .penalty {
    position:absolute; top:600px; left:50%; transform:translateX(-50%) translateY(30px);
    font-size:32px; font-weight:700; opacity:0; text-align:center;
    background: linear-gradient(90deg, #ffd60a, #ff8a00);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation: fadeUp 0.8s ease forwards; animation-delay: 2.2s;
  }
  @keyframes fadeUp { to { opacity:1; transform:translateX(-50%) translateY(0); } }
</style>
</head>
<body>
  <div class="stage">
    <div class="badge">⚠ CIT DEADLINE</div>
    <div class="deadline">Audited Accounts due<br><b>6 months</b> after year-end</div>
    <div class="penalty">Penalties: 100,000s of Naira</div>
  </div>
</body>
</html>
