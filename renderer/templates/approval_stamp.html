<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="brand_colors.css">
<style>
  html, body {
    margin:0; padding:0; background: transparent;
    width:1080px; height:1920px; overflow:hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
  }
  .stage { position:relative; width:1080px; height:1920px; }

  .stampWrap {
    position:absolute; top:750px; left:50%;
    transform: translate(-50%, -400px) rotate(-10deg) scale(0.6);
    opacity: 0;
    transition: transform 0.9s cubic-bezier(.34,1.56,.64,1), opacity 0.3s ease;
  }
  .stampWrap.show {
    transform: translate(-50%, 0) rotate(-10deg) scale(1);
    opacity: 1;
  }

  .stamp {
    width:340px; height:340px; border-radius:50%;
    border: 8px solid #2ECC71;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: rgba(46,204,113,0.12);
    box-shadow: 0 0 0 6px rgba(46,204,113,0.15), 0 20px 50px rgba(0,0,0,0.4);
  }
  .stamp.declined { border-color:#E63946; background: rgba(230,57,70,0.12); box-shadow: 0 0 0 6px rgba(230,57,70,0.15), 0 20px 50px rgba(0,0,0,0.4); }

  .stampInnerRing {
    width:280px; height:280px; border-radius:50%; border:3px solid #2ECC71;
    display:flex; align-items:center; justify-content:center;
  }
  .declined .stampInnerRing { border-color:#E63946; }

  .stampText {
    font-size:44px; font-weight:800; color:#2ECC71; letter-spacing:3px; text-align:center;
  }
  .declined .stampText { color:#E63946; }

  .impactRing {
    position:absolute; top:50%; left:50%; width:340px; height:340px; border-radius:50%;
    transform:translate(-50%,-50%) scale(0.6); opacity:0;
    border: 4px solid #2ECC71;
  }
  .impactRing.show {
    animation: impactPulse 0.6s ease-out forwards;
  }
  @keyframes impactPulse {
    0% { transform:translate(-50%,-50%) scale(0.6); opacity:0.8; }
    100% { transform:translate(-50%,-50%) scale(1.6); opacity:0; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="stampWrap" id="stampWrap">
      <div class="impactRing" id="impactRing"></div>
      <div class="stamp" id="stamp">
        <div class="stampInnerRing">
          <div class="stampText" id="stampText">APPROVED</div>
        </div>
      </div>
    </div>
  </div>

<script>
  const stampWrap = document.getElementById('stampWrap');
  const impactRing = document.getElementById('impactRing');

  setTimeout(() => { stampWrap.classList.add('show'); }, 200);
  setTimeout(() => { impactRing.classList.add('show'); }, 950);
</script>
</body>
</html>
