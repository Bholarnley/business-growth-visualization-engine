<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="brand_colors.css">
<style>
  html, body {
    margin:0; padding:0; background: transparent;
    width:1080px; height:1920px; overflow:hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
  }
  .stage { position:relative; width:1080px; height:1920px; }

  .heading {
    position:absolute; top:100px; left:50%; transform:translateX(-50%) scale(0.8); opacity:0;
    font-size:34px; font-weight:800; color:#FFFFFF;
    background: linear-gradient(135deg, #1B2430, #4A4A4A);
    padding:16px 32px; border-radius:14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transition: transform 0.8s cubic-bezier(.22,.68,0,1.01), opacity 0.8s ease;
  }
  .heading.show { transform:translateX(-50%) scale(1); opacity:1; }

  .list {
    position:absolute; top:260px; left:70px; width:940px;
    display:flex; flex-direction:column; gap:18px;
  }

  .item {
    display:flex; align-items:center; gap:24px;
    background: rgba(18,18,18,0.85); border-radius:14px; padding:22px 28px;
    opacity:0; transform:translateX(-40px);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.22,.68,0,1.01);
  }
  .item.show { opacity:1; transform:translateX(0); }

  .arrowUp {
    width:56px; height:56px; min-width:56px; border-radius:50%; flex-shrink:0;
    background-color: #E63946;
    background-image: linear-gradient(135deg, #E63946, #FF6B00);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 4px 16px rgba(230,57,70,0.5);
  }
  .arrowUp svg { width:28px; height:28px; }

  .itemLabel { font-size:32px; font-weight:700; color:#FFFFFF; flex:1; }

  .itemTag {
    font-size:22px; font-weight:800; color: #FF6B00; letter-spacing:1px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="heading" id="heading">YOUR COSTS ARE RISING</div>

    <div class="list" id="list">
      <div class="item">
        <div class="arrowUp"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></div>
        <div class="itemLabel">Rent</div><div class="itemTag">UP</div>
      </div>
      <div class="item">
        <div class="arrowUp"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></div>
        <div class="itemLabel">Fuel</div><div class="itemTag">UP</div>
      </div>
      <div class="item">
        <div class="arrowUp"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></div>
        <div class="itemLabel">Salaries</div><div class="itemTag">UP</div>
      </div>
      <div class="item">
        <div class="arrowUp"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></div>
        <div class="itemLabel">Internet</div><div class="itemTag">UP</div>
      </div>
      <div class="item">
        <div class="arrowUp"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></div>
        <div class="itemLabel">Business costs</div><div class="itemTag">UP</div>
      </div>
    </div>
  </div>

<script>
  const heading = document.getElementById('heading');
  const items = document.querySelectorAll('.item');

  const startDelay = 200;
  const itemStagger = 380;

  setTimeout(() => { heading.classList.add('show'); }, startDelay);

  items.forEach((item, i) => {
    setTimeout(() => { item.classList.add('show'); }, startDelay + 500 + i * itemStagger);
  });
</script>
</body>
</html>
