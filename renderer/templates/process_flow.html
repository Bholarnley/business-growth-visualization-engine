<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="brand_colors.css">
<style>
  html, body {
    margin:0; padding:0; background: transparent;
    width:1080px; height:1920px; overflow:hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
  }
  .stage { position:relative; width:1080px; height:1920px; }

  .heading {
    position:absolute; top:100px; left:50%; transform:translateX(-50%) scale(0.8); opacity:0;
    font-size:34px; font-weight:800; color:var(--brand-white);
    background: var(--gradient-primary);
    padding:16px 32px; border-radius:14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transition: transform 0.8s cubic-bezier(.22,.68,0,1.01), opacity 0.8s ease;
  }
  .heading.show { transform:translateX(-50%) scale(1); opacity:1; }

  .flow {
    position:absolute; top:280px; left:80px; width:920px;
    display:flex; flex-direction:column; gap:0;
  }

  .stepRow { display:flex; align-items:center; gap:24px; }

  .stepCircle {
    width:70px; height:70px; border-radius:50%; flex-shrink:0;
    background: rgba(255,255,255,0.08); border: 3px solid rgba(255,255,255,0.25);
    display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:800; color: rgba(255,255,255,0.4);
    transition: all 0.5s cubic-bezier(.17,.89,.32,1.49);
  }
  .stepCircle.active {
    background: var(--gradient-highlight); border-color: transparent;
    color: var(--brand-white); box-shadow: var(--shadow-highlight);
    transform: scale(1.1);
  }

  .stepLabel {
    font-size:30px; font-weight:700; color: rgba(255,255,255,0.4);
    background: rgba(18,18,18,0.6); padding:18px 26px; border-radius:12px; flex:1;
    transition: all 0.5s ease;
  }
  .stepLabel.active { color: var(--brand-white); background: rgba(18,18,18,0.85); }

  .connector {
    width:6px; height:50px; margin-left:32px;
    background: rgba(255,255,255,0.15);
    transition: background 0.5s ease;
  }
  .connector.active { background: var(--brand-orange); }
</style>
</head>
<body>
  <div class="stage">
    <div class="heading" id="heading">GETTING COMPLIANT</div>

    <div class="flow" id="flow">
      <div class="stepRow">
        <div class="stepCircle" data-i="0">1</div>
        <div class="stepLabel" data-i="0">Register your business</div>
      </div>
      <div class="connector" data-i="0"></div>

      <div class="stepRow">
        <div class="stepCircle" data-i="1">2</div>
        <div class="stepLabel" data-i="1">Set up proper bookkeeping</div>
      </div>
      <div class="connector" data-i="1"></div>

      <div class="stepRow">
        <div class="stepCircle" data-i="2">3</div>
        <div class="stepLabel" data-i="2">File monthly & annual returns</div>
      </div>
      <div class="connector" data-i="2"></div>

      <div class="stepRow">
        <div class="stepCircle" data-i="3">4</div>
        <div class="stepLabel" data-i="3">Stay audit-ready year round</div>
      </div>
    </div>
  </div>

<script>
  const heading = document.getElementById('heading');
  const circles = document.querySelectorAll('.stepCircle');
  const labels = document.querySelectorAll('.stepLabel');
  const connectors = document.querySelectorAll('.connector');

  const startDelay = 200;
  const stepStagger = 550;

  setTimeout(() => { heading.classList.add('show'); }, startDelay);

  circles.forEach((circle, i) => {
    const delay = startDelay + 600 + i * stepStagger;
    setTimeout(() => {
      circle.classList.add('active');
      labels[i].classList.add('active');
      if (connectors[i]) connectors[i].classList.add('active');
    }, delay);
  });
</script>
</body>
</html>
