<!DOCTYPE html>
<html>
<head>
<style>
  html, body {
    margin:0; padding:0; background: transparent;
    width:1080px; height:1920px; overflow:hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  .stage { position:relative; width:1080px; height:1920px; }

  .card {
    position:absolute; top:120px; left:50%;
    transform:translateX(-50%) scale(0.7); opacity:0;
    background: linear-gradient(135deg, #1e1e3f, #3d1e6d);
    padding:40px 50px; border-radius:24px; text-align:center;
    box-shadow: 0 10px 40px rgba(61,30,109,0.5);
    transition: transform 0.6s cubic-bezier(.17,.89,.32,1.49), opacity 0.5s ease;
  }
  .card.show { transform:translateX(-50%) scale(1); opacity:1; }

  .label {
    font-size:34px; color:#ccc; font-weight:600; letter-spacing:1px;
    margin-bottom:14px;
  }

  .value {
    font-size:88px; font-weight:800;
    background: linear-gradient(90deg, #ffd60a, #ff8a00);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  .sub {
    margin-top:14px; font-size:26px; color:#ff8a00; font-weight:700;
    opacity:0; transition: opacity 0.6s ease;
  }
  .sub.show { opacity:1; }
</style>
</head>
<body>
  <div class="stage">
    <div class="card" id="card">
      <div class="label">VAT ON YOUR ₦100,000 SERVICE</div>
      <div class="value" id="value">₦0</div>
      <div class="sub" id="sub">7.5% — must be remitted, not kept</div>
    </div>
  </div>

<script>
  const card = document.getElementById('card');
  const valueEl = document.getElementById('value');
  const sub = document.getElementById('sub');

  const target = 7500;      // change this number for any future VAT/KPI amount
  const prefix = '₦';
  const duration = 1800;    // ms for the count-up itself
  const startDelay = 300;

  setTimeout(() => {
    card.classList.add('show');

    const startTime = performance.now();
    function tick(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      // ease-out so it starts fast and settles gently at the end
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = Math.floor(eased * target);
      valueEl.textContent = prefix + current.toLocaleString();
      if (progress < 1) {
        requestAnimationFrame(tick);
      } else {
        valueEl.textContent = prefix + target.toLocaleString();
        sub.classList.add('show');
      }
    }
    requestAnimationFrame(tick);
  }, startDelay);
</script>
</body>
</html>
