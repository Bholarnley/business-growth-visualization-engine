<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="brand_colors.css">
<style>
  html, body {
    margin:0; padding:0; background: transparent;
    width:1080px; height:1920px; overflow:hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
  }
  .stage { position:relative; width:1080px; height:1920px; }

  .cardWrap {
    position:absolute; top:100px; left:90px; width:900px;
    border-radius:22px; overflow:hidden;
    background: #FFFFFF;
    box-shadow: 0 16px 50px rgba(0,0,0,0.5);
    opacity:0; transform:translateX(-60px);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(.22,.68,0,1.01);
  }
  .cardWrap.show { opacity:1; transform:translateX(0); }

  .header {
    background: linear-gradient(135deg, #1B2430, #4A4A4A);
    padding:26px 32px; display:flex; justify-content:space-between; align-items:center;
  }
  .headerTitle { font-size:30px; font-weight:800; color:#FFFFFF; letter-spacing:1px; }
  .headerTag { font-size:18px; font-weight:700; color:#FFB800; }

  .body { padding:30px 32px; }

  .line {
    display:flex; justify-content:space-between; padding:14px 0;
    border-bottom:1px solid #eee;
    opacity:0; transform:translateY(12px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .line.show { opacity:1; transform:translateY(0); }
  .lineLabel { font-size:24px; color:#333; font-weight:600; }
  .lineValue { font-size:24px; color:#121212; font-weight:700; }

  .totalLine {
    display:flex; justify-content:space-between; padding-top:22px; margin-top:10px;
    border-top:3px solid #FF6B00;
    opacity:0; transform:translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .totalLine.show { opacity:1; transform:translateY(0); }
  .totalLabel { font-size:28px; font-weight:800; color:#121212; }
  .totalValue { font-size:32px; font-weight:800; color:#FF6B00; }
</style>
</head>
<body>
  <div class="stage">
    <div class="cardWrap" id="cardWrap">
      <div class="header">
        <div class="headerTitle">INVOICE</div>
        <div class="headerTag">#INV-0042</div>
      </div>
      <div class="body">
        <div class="line" data-i="0"><div class="lineLabel">Consulting Services</div><div class="lineValue">₦150,000</div></div>
        <div class="line" data-i="1"><div class="lineLabel">Bookkeeping Setup</div><div class="lineValue">₦80,000</div></div>
        <div class="line" data-i="2"><div class="lineLabel">VAT (7.5%)</div><div class="lineValue">₦17,250</div></div>
        <div class="totalLine" id="totalLine"><div class="totalLabel">Total Due</div><div class="totalValue">₦247,250</div></div>
      </div>
    </div>
  </div>

<script>
  const cardWrap = document.getElementById('cardWrap');
  const lines = document.querySelectorAll('.line');
  const totalLine = document.getElementById('totalLine');

  const startDelay = 200;
  const lineStagger = 450;

  setTimeout(() => { cardWrap.classList.add('show'); }, startDelay);

  lines.forEach((line, i) => {
    setTimeout(() => { line.classList.add('show'); }, startDelay + 500 + i * lineStagger);
  });

  setTimeout(() => { totalLine.classList.add('show'); }, startDelay + 500 + lines.length * lineStagger + 200);
</script>
</body>
</html>
